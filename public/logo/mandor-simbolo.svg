<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 50" fill="#211F1A" role="img" aria-label="Mandor monograma">
  <!-- Mandor Brand Book v1 — Monograma I/I institucional.
       Dois pilares fixos (1u×5u) + pilar central skewed 15° (paralelogramo
       com topo e base horizontais, lados diagonais descendo do alto-direita
       ao baixo-esquerda). Unidade 1u = 10. -->
  <rect x="0"  y="0" width="10" height="50"/>
  <polygon points="25.4,0 35.4,0 22,50 12,50"/>
  <rect x="37.4" y="0" width="10" height="50"/>
</svg>
